        background-position: center bottom;
        background-size: contain;
        image-rendering: pixelated;
        transform-origin: 50% 100%;
        animation: nagiRabbitHop 0.72s linear infinite;
        z-index: 5;
      }

      .nagi-loading-text {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 18px;
        text-align: center;
        color: #8b8880;
        font-family: var(--chat-font, monospace);
        font-size: 12px;
        letter-spacing: 0.08em;
        animation: nagiLoadingBlink 1.2s ease-in-out infinite;
      }

      @keyframes nagiRabbitHop {
        0%, 100% { transform: translateY(2px) scale(1.03, 0.97); }
        13% { transform: translateY(-8px) scale(1); }
        33% { transform: translateY(-32px) scale(1); }
        50% { transform: translateY(-40px) scale(1); }
        68% { transform: translateY(-23px) scale(1.01); }
        86% { transform: translateY(0) scale(1.02, 0.99); }
      }

      @keyframes nagiRabbitShadow {
        0%, 100% { transform: scaleX(1); opacity: 0.22; }
        42%, 58% { transform: scaleX(0.56); opacity: 0.12; }
      }

      @keyframes nagiStripMove {
        from { transform: translateX(0); }
        to { transform: translateX(-50%); }
      }

      @keyframes nagiGrassSway {
        from { transform: skewX(-3deg) rotate(-1.5deg); }
        to { transform: skewX(6deg) rotate(4deg); }
      }

      @keyframes nagiLoadingBlink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.55; }
      }

      @media (max-width: 680px) {
        .nagi-loader-stage {
          width: min(360px, calc(100vw - 28px));
          border-radius: 19px;
        }

        .nagi-rabbit {
          left: 24px;
          width: 104px;
          height: 105px;
        }

        .nagi-rabbit-shadow {
          left: 48px;
          width: 58px;
        }

        .nagi-moving-strip {
          bottom: 47px;
        }

        .nagi-ground-shadow {
          bottom: 46px;
        }

        .nagi-ground-line {
          bottom: 47px;
        }

        .nagi-loading-text {
          bottom: 15px;
          font-size: 11px;
        }
      }

      .feedback {
        min-height: 20px;
        color: var(--muted);
        font-size: 12px;
      }

      .empty {
        margin: 56px auto;
        max-width: 560px;
        color: var(--muted);
        text-align: center;
      }

      /* 手机侧边栏断点。
         680px 以下时，红框里的窗口列表会变成类似 ChatGPT 的左侧抽屉。
         默认只显示蓝框里的主聊天界面，点左上角菜单按钮再打开窗口列表。 */
      @media (max-width: 680px) {
        .app {
          grid-template-columns: 1fr;
        }

        .sidebar {
          position: fixed;
          z-index: 30;
          top: 0;
          bottom: 0;
          left: 0;
          width: min(84vw, 320px);
          border-right: 1px solid var(--line);
          border-bottom: 0;
          box-shadow: 18px 0 40px rgba(31, 38, 35, 0.18);
          transform: translateX(-105%);
          transition: transform 180ms ease;
          overflow-y: auto;
          overscroll-behavior: contain;
          -webkit-overflow-scrolling: touch;
        }

        body.sidebar-open .sidebar {
          transform: translateX(0);
        }

        .sidebar-backdrop {
          position: fixed;
          z-index: 25;
          inset: 0;
          display: block;
          background: rgba(32, 33, 36, 0.28);
          opacity: 0;
          pointer-events: none;
          transition: opacity 180ms ease;
        }

        body.sidebar-open .sidebar-backdrop {
          opacity: 1;
          pointer-events: auto;
        }

        .sidebar-toggle,
        .sidebar-close {
          display: inline-flex;
          align-items: center;
          justify-content: center;
        }

        .brand-header {
          justify-content: space-between;
        }

        .main {
          min-height: 0;
          height: 100%;
        }

        .topbar {
          position: sticky;
          top: 0;
          z-index: 10;
          align-items: flex-start;
          flex-direction: column;
          gap: 10px;
          padding: 12px 14px;
        }

        .topbar-title {
          width: 100%;
        }

        .actions {
          justify-content: flex-start;
        }

        .prepack-turn-control {
          min-height: 32px;
          font-size: 12px;
        }

        .prepack-turn-control input {
          width: 56px;
          min-height: 24px;
          font-size: 12px;
        }

        button {
          min-height: 32px;
          padding: 0 9px;
          font-size: 12px;
        }

        .content-shell {
          display: block;
        }

        .mobile-scroll-jump-controls {
          position: fixed;
          z-index: 12;
          top: 50%;
          right: 8px;
          display: grid;
          gap: 8px;
          transform: translateY(-50%);
          pointer-events: none;
        }

        body.sidebar-open .mobile-scroll-jump-controls {
          display: none;
        }

        .mobile-scroll-jump-controls button {
          display: flex;
          align-items: center;
          justify-content: center;
          width: 34px;
          min-width: 34px;
          height: 34px;
          min-height: 34px;
          border: 1px solid var(--scroll-button-border);
          border-radius: 999px;
          padding: 0;
          background: var(--scroll-button-bg);
          color: var(--accent);
          box-shadow: var(--scroll-button-shadow);
          font-family: Georgia, "Times New Roman", serif;
          font-size: 20px;
          font-weight: 400;
          line-height: 1;
          pointer-events: auto;
        }

        .mobile-scroll-jump-controls button:disabled {
          color: color-mix(in srgb, var(--accent) 34%, transparent);
          box-shadow: none;
          opacity: 1;
        }

        .message {
          grid-template-columns: var(--avatar-size) 3px minmax(0, 1fr) 3px var(--avatar-size);
          max-width: 100%;
          --avatar-size: 32px;
          --bubble-avatar-gap: 3px;
        }

        .pixel-avatar {
          width: 32px;
          height: 32px;
          border-radius: 10px;
        }

        .bubble {
          max-width: 100%;
        }

        .message-head {
          gap: 6px;
          font-size: 11px;
        }

        .message-body {
          font-size: 14px;
        }


      }
    </style>
      <script src="/shared/pwa.js" defer></script>
</head>
  <body>



    <div id="nagi-loader-wrapper" aria-label="正在加载聊天记录">
      <div class="nagi-loader-stage" aria-hidden="true">
        <div class="nagi-ground-shadow"></div>
        <div class="nagi-ground-line"></div>
        <div class="nagi-moving-strip">
          <div class="nagi-grass nagi-g1"></div>
          <div class="nagi-grass nagi-g2"></div>
          <div class="nagi-grass nagi-g3"></div>
          <div class="nagi-obstacle nagi-c1"></div>
          <div class="nagi-grass nagi-g4"></div>
          <div class="nagi-grass nagi-g5"></div>
          <div class="nagi-obstacle nagi-c2"></div>
          <div class="nagi-grass nagi-g6"></div>
          <div class="nagi-obstacle nagi-c3"></div>
          <div class="nagi-grass nagi-g7"></div>
          <div class="nagi-grass nagi-g8"></div>
          <div class="nagi-obstacle nagi-c4"></div>
        </div>
        <div class="nagi-rabbit-shadow"></div>
        <div class="nagi-rabbit"></div>
        <div class="nagi-loading-text">正在唤醒庭院记忆...</div>
      </div>
    </div>
    <div class="app">
      <div id="sidebarBackdrop" class="sidebar-backdrop" aria-hidden="true"></div>
      <aside id="sidebar" class="sidebar" aria-label="聊天窗口列表">
        <div class="brand">
          <div class="brand-header">
            <div>
              <h1>Gem Chat Records</h1>
              <p>管理 Gem bridge 本地上下文。删除会永久移出当前记录；归档不会喂给模型。</p>
            </div>
            <button id="sidebarCloseButton" class="icon-button sidebar-close" type="button" aria-label="关闭侧边栏">×</button>
          </div>
        </div>
        <div class="search-panel">
          <input id="searchInput" class="search-input" type="search" placeholder="搜索所有聊天" autocomplete="off" aria-label="搜索所有聊天记录" />
          <div id="searchScopes" class="search-scopes" aria-label="搜索范围">
            <button class="search-scope active" type="button" data-search-scope="all">全部</button>
            <button class="search-scope" type="button" data-search-scope="telegram">主 Gem</button>
            <button class="search-scope" type="button" data-search-scope="telegram_rp">RP Gem</button>
          </div>
        </div>
        <div id="searchResults" class="search-results" aria-live="polite"></div>
        <div id="chatList" class="chat-list"></div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div class="topbar-title">
            <button id="sidebarToggleButton" class="icon-button sidebar-toggle" type="button" aria-label="打开侧边栏">☰</button>
            <div>
              <h2 id="chatTitle"></h2>
              <p id="chatMeta" class="muted"></p>
              <div id="feedback" class="feedback"></div>
            </div>
          </div>
          <div class="actions">
            <label class="prepack-turn-control" title="删除记录后创建新 Antigravity 窗口时导入的最近 user 轮数">
              <span>新窗轮数</span>
              <input id="prepackTurnsInput" type="number" min="1" max="200" step="1" value="35" aria-label="新窗口导入最近轮数" />
            </label>
            <button id="savePrepackTurnsButton" type="button">保存轮数</button>
            <button id="themeToggleButton" type="button" aria-pressed="false">桃子汽水</button>
            <button id="refreshButton" type="button">刷新</button>
            <button id="deleteButton" class="danger" type="button">永久删除选中</button>
          </div>
        </header>

        <section class="content-shell">
          <div id="timeline" class="timeline"></div>
          <nav id="conversationNavigator" class="conversation-navigator" aria-label="对话导航">
            <div id="conversationNavCollapsed" class="conversation-nav-collapsed"></div>
            <div class="conversation-nav-panel">
              <button id="scrollTopButton" class="conversation-nav-jump top" type="button" aria-label="快速回到顶部">❀</button>
              <div id="conversationNavList" class="conversation-nav-list"></div>
              <button id="scrollBottomButton" class="conversation-nav-jump bottom" type="button" aria-label="快速回到底部">❀</button>
            </div>
          </nav>
          <div class="mobile-scroll-jump-controls" aria-label="快速滚动">
            <button id="mobileScrollTopButton" type="button" aria-label="快速回到顶部">☂︎</button>
            <button id="mobileScrollBottomButton" type="button" aria-label="快速回到底部">❀</button>
          </div>
        </section>
      </main>
    </div>

    <script>
      const state = {
        chats: [],
        currentWindow: null,
        messages: [],
        selected: new Set(),
        selectMode: false,
        longPressTimer: null,
        justLongPressed: false,
        chatActionWindowId: "",
        chatLongPressTimer: null,
        justOpenedChatActions: false,
        searchQuery: "",
        searchScope: "all",
        searchResults: [],
        searchTotal: 0,
        searchTimer: null,
        searchRequest: 0,
        conversationNavItems: [],
        conversationNavGroups: [],
        activeConversationNavIndex: -1,
        prepackSettings: {
          prepackRecentTurns: 35,
          minPrepackRecentTurns: 1,
          maxPrepackRecentTurns: 200
        }
      };

      const sidebar = document.getElementById("sidebar");
      const chatList = document.getElementById("chatList");
      const searchInput = document.getElementById("searchInput");
      const searchScopes = document.getElementById("searchScopes");
      const searchResults = document.getElementById("searchResults");
      const chatTitle = document.getElementById("chatTitle");
      const chatMeta = document.getElementById("chatMeta");
      const feedback = document.getElementById("feedback");
      const timeline = document.getElementById("timeline");
      const sidebarToggleButton = document.getElementById("sidebarToggleButton");
      const sidebarCloseButton = document.getElementById("sidebarCloseButton");
      const sidebarBackdrop = document.getElementById("sidebarBackdrop");
      const prepackTurnsInput = document.getElementById("prepackTurnsInput");
      const savePrepackTurnsButton = document.getElementById("savePrepackTurnsButton");
      const themeToggleButton = document.getElementById("themeToggleButton");
      const refreshButton = document.getElementById("refreshButton");
      const deleteButton = document.getElementById("deleteButton");
      const scrollTopButton = document.getElementById("scrollTopButton");
      const scrollBottomButton = document.getElementById("scrollBottomButton");
      const mobileScrollTopButton = document.getElementById("mobileScrollTopButton");
      const mobileScrollBottomButton = document.getElementById("mobileScrollBottomButton");
      const conversationNavigator = document.getElementById("conversationNavigator");
      const conversationNavCollapsed = document.getElementById("conversationNavCollapsed");
      const conversationNavList = document.getElementById("conversationNavList");


      function hideNagiLoader() {
        const loader = document.getElementById("nagi-loader-wrapper");
        if (!loader) return;

        loader.classList.add("hidden");

        window.setTimeout(() => {
          loader.style.display = "none";
        }, 220);
      }

      function showNagiLoader() {
        const loader = document.getElementById("nagi-loader-wrapper");
        if (!loader) return;

        loader.style.display = "flex";
        requestAnimationFrame(() => {
          loader.classList.remove("hidden");
        });
      }

      function setFeedback(text) {
        feedback.textContent = text || "";
      }

      function setTheme(theme) {
        const normalizedTheme = ["garden", "soda", "peach"].includes(theme) ? theme : "garden";
        document.body.dataset.theme = normalizedTheme;
        const nextThemeLabel = {
          garden: "Peach Soda",
          soda: "白桃乌龙",
          peach: "旧版清绿"
        }[normalizedTheme];
        themeToggleButton.textContent = nextThemeLabel;
        themeToggleButton.setAttribute("aria-pressed", normalizedTheme === "garden" ? "false" : "true");
        try {
          localStorage.setItem("gemChatRecordsThemeChoice", normalizedTheme);
        } catch (_error) {
          // Ignore storage failures; the button still works for the current page.
        }
        requestAnimationFrame(() => {
          syncTimelineBottomGap();
          scheduleTimelineViewportFix();
        });
      }

      function toggleTheme() {
        const nextTheme = {
          garden: "soda",
          soda: "peach",
          peach: "garden"
        }[document.body.dataset.theme] || "soda";
        setTheme(nextTheme);
      }

      function setSidebarOpen(open) {
        document.body.classList.toggle("sidebar-open", open);
        sidebarToggleButton.setAttribute("aria-expanded", open ? "true" : "false");
      }

      function setChatActionsOpen(windowId) {
        state.chatActionWindowId = windowId || "";
        renderChats();
      }

      function formatDate(value) {
        if (!value) return "无时间";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return value;
        return new Intl.DateTimeFormat("zh-CN", {
          dateStyle: "medium",
          timeStyle: "short",
          hour12: false
        }).format(date);
      }

      function formatDay(value) {
        if (!value) return "无时间";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return value;
        return new Intl.DateTimeFormat("zh-CN", {
          dateStyle: "full"
        }).format(date);
      }

      function formatShortTime(value) {
        if (!value) return "";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return "";
        return new Intl.DateTimeFormat("zh-CN", {
          hour: "2-digit",
          minute: "2-digit",
          hour12: false
        }).format(date);
      }

      function escapeText(value) {
        return String(value || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      async function fetchJson(url, options) {
        const response = await fetch(url, options);
        const json = await response.json();
        if (!response.ok) {
          throw new Error(json.error || `Request failed: ${response.status}`);
        }
        return json;
      }

      const API_BASE = window.location.pathname.startsWith("/chat-records-live")
        ? "/chat-records-live"
        : "";

      function normalizePrepackTurns(value) {
        const min = state.prepackSettings.minPrepackRecentTurns || 1;
        const max = state.prepackSettings.maxPrepackRecentTurns || 200;
        const parsed = Number.parseInt(value, 10);
        const base = Number.isFinite(parsed)
          ? parsed
          : state.prepackSettings.prepackRecentTurns || 35;
        return Math.min(max, Math.max(min, base));
      }

      function renderPrepackSettings() {
        prepackTurnsInput.min = String(state.prepackSettings.minPrepackRecentTurns || 1);
        prepackTurnsInput.max = String(state.prepackSettings.maxPrepackRecentTurns || 200);
        prepackTurnsInput.value = String(state.prepackSettings.prepackRecentTurns || 35);
        savePrepackTurnsButton.disabled = false;
      }

      async function loadPrepackSettings() {
        const data = await fetchJson(`${API_BASE}/api/prepack-settings`);
        state.prepackSettings = data;
        renderPrepackSettings();
      }

      async function savePrepackSettings() {
        const prepackRecentTurns = normalizePrepackTurns(prepackTurnsInput.value);
        savePrepackTurnsButton.disabled = true;
        try {
          const data = await fetchJson(`${API_BASE}/api/prepack-settings`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ prepackRecentTurns })
          });
          state.prepackSettings = data;
          renderPrepackSettings();
          setFeedback(`新窗口导入轮数已保存：最近 ${data.prepackRecentTurns} 轮`);
        } finally {
          savePrepackTurnsButton.disabled = false;
        }
      }

      function chatSortTime(chat) {
        const value = chat?.latestAt || chat?.updatedAt || "";
        const time = new Date(value).getTime();
        return Number.isNaN(time) ? 0 : time;
      }

      function latestChat(chats) {
        return [...chats].sort((a, b) => chatSortTime(b) - chatSortTime(a))[0] || null;
      }

      function renderSearchResults() {
        const searching = Boolean(state.searchQuery);
        sidebar.classList.toggle("searching", searching);
        searchScopes.querySelectorAll("[data-search-scope]").forEach((button) => {
          button.classList.toggle("active", button.dataset.searchScope === state.searchScope);
        });
        if (!searching) {
          searchResults.innerHTML = "";
          return;
        }
        if (state.searchResults.length === 0) {
          searchResults.innerHTML = '<p class="empty">没有找到匹配的消息。</p>';
          return;
        }
        const countText =
          state.searchTotal > state.searchResults.length
            ? `${state.searchResults.length} / ${state.searchTotal} 条结果`
            : `${state.searchTotal} 条结果`;
        searchResults.innerHTML = `
          <p class="search-summary">${escapeText(countText)}</p>
          ${state.searchResults.map((result) => `
            <button class="search-result" type="button" data-window-id="${escapeText(result.windowId)}" data-message-id="${escapeText(result.messageId)}">
              <span class="search-result-head">
                <span class="search-result-title">${escapeText(result.title)}</span>
                <span class="search-result-meta">${result.bucket === "archive" ? "归档" : escapeText(result.role)} · ${escapeText(formatShortTime(result.at))}</span>
              </span>
              <span class="search-excerpt">${escapeText(result.excerpt.before)}<mark>${escapeText(result.excerpt.match)}</mark>${escapeText(result.excerpt.after)}</span>
            </button>
          `).join("")}
        `;
        searchResults.querySelectorAll(".search-result").forEach((button) => {
          button.addEventListener("click", () => {
            const chat = state.chats.find((item) => item.windowId === button.dataset.windowId);
            if (!chat) return;
            setSidebarOpen(false);
            loadWindow(chat, { messageId: button.dataset.messageId }).catch(reportError);
          });
        });
      }

      async function runSearch() {
        const query = searchInput.value.trim();
        state.searchQuery = query;
        if (!query) {
          state.searchResults = [];
          state.searchTotal = 0;
          renderSearchResults();
          return;
        }
        const requestId = ++state.searchRequest;
        searchResults.innerHTML = '<p class="empty">正在搜索…</p>';
        sidebar.classList.add("searching");
        const params = new URLSearchParams({
          q: query,
          scope: state.searchScope,
          limit: "100"
        });
        const data = await fetchJson(`${API_BASE}/api/search?${params}`);
        if (requestId !== state.searchRequest) return;
        state.searchResults = data.results;
        state.searchTotal = data.total;
        renderSearchResults();
      }

      function scheduleSearch() {
        window.clearTimeout(state.searchTimer);
        state.searchTimer = window.setTimeout(() => runSearch().catch(reportError), 220);
      }

      function renderChats() {
        if (state.chats.length === 0) {
          chatList.innerHTML = '<p class="empty">还没有找到聊天 JSON。</p>';
          return;
        }

        const telegramRpChats = state.chats.filter((chat) => chat.kind === "telegram_rp");
        const telegramChats = state.chats.filter((chat) => chat.kind === "telegram");
        const renderGroup = (title, chats) => {
          if (chats.length === 0) return "";
          return `
            <div class="chat-group-title">${escapeText(title)}</div>
            ${chats
              .map((chat) => {
                const active =
                  state.currentWindow &&
                  chat.windowId === state.currentWindow.windowId
                    ? " active"
                    : "";
                const actionsOpen = state.chatActionWindowId === chat.windowId;
                const canArchive = chat.kind === "active" && chat.activeCount > 0;
                const canDeleteArchive = chat.kind === "archive";
                const canRename = chat.kind === "telegram_rp" || chat.kind === "telegram";
                const canNewMainWindow = chat.kind === "telegram";
                const canSwitchMainWindow = chat.kind === "telegram" && !chat.isActiveMainWindow;
                const mainWindowPill =
                  chat.kind === "telegram"
                    ? `<span class="pill">${chat.isActiveMainWindow ? "当前" : "未激活"}</span>`
                    : "";
            return `
              <div class="chat-button${active}${actionsOpen ? " actions-open" : ""}" role="button" tabindex="0" data-window-id="${escapeText(chat.windowId)}">
                <div class="chat-title">
                  <span>${escapeText(chat.title)}</span>
                  <span class="pill">${chat.activeCount}</span>
                  ${mainWindowPill}
                </div>
                <p class="muted">${escapeText(formatDate(chat.latestAt || chat.updatedAt))}</p>
                <p class="muted">${escapeText(chat.latestPreview || "无消息")}</p>
                <p class="muted">${
                  chat.kind === "telegram"
                    ? "Telegram 当前总窗口"
                    : chat.kind === "telegram_rp"
                    ? "Telegram RP"
                    : `${escapeText(chat.sourceLabel || "归档窗口")} / 归档`
                }</p>
                <div class="chat-actions">
                  <button class="chat-action-button" type="button" data-chat-action="export" data-window-id="${escapeText(chat.windowId)}">导出 JSON</button>
                  ${
                    canNewMainWindow
                      ? `<button class="chat-action-button" type="button" data-chat-action="newMainWindow" data-window-id="${escapeText(chat.windowId)}">新建窗口</button>`
                      : ""
                  }
                  ${
                    chat.kind === "telegram"
                      ? `<button class="chat-action-button" type="button" data-chat-action="switchMainWindow" data-window-id="${escapeText(chat.windowId)}" ${canSwitchMainWindow ? "" : "disabled"}>切换到此窗口</button>`
                      : ""
                  }
                  <button class="chat-action-button" type="button" data-chat-action="rename" data-window-id="${escapeText(chat.windowId)}" ${canRename ? "" : "disabled"}>重命名</button>
                  <button class="chat-action-button" type="button" data-chat-action="archive" data-window-id="${escapeText(chat.windowId)}" ${canArchive ? "" : "disabled"}>归档当前窗口</button>
                  <button class="chat-action-button danger" type="button" data-chat-action="deleteArchive" data-window-id="${escapeText(chat.windowId)}" ${canDeleteArchive ? "" : "disabled"}>删除归档窗口</button>
                </div>
              </div>
            `;
              })
              .join("")}
          `;
        };

        chatList.innerHTML =
          renderGroup("TELEGRAM RP", telegramRpChats) +
          renderGroup("主 Bot 窗口", telegramChats);

        chatList.querySelectorAll(".chat-button[data-window-id]").forEach((button) => {
          const openActions = () => {
            state.justOpenedChatActions = true;
            setChatActionsOpen(button.dataset.windowId);
            window.setTimeout(() => {
              state.justOpenedChatActions = false;
            }, 0);
          };
          button.addEventListener("pointerdown", () => {
            window.clearTimeout(state.chatLongPressTimer);
            state.chatLongPressTimer = window.setTimeout(openActions, 520);
          });
          button.addEventListener("pointerup", () => {
            window.clearTimeout(state.chatLongPressTimer);
          });
          button.addEventListener("pointercancel", () => {
            window.clearTimeout(state.chatLongPressTimer);
          });
          button.addEventListener("pointerleave", () => {
            window.clearTimeout(state.chatLongPressTimer);
          });
          button.addEventListener("keydown", (event) => {
            if (event.key === "Enter" || event.key === " ") {
              event.preventDefault();
              button.click();
            }
          });
          button.addEventListener("click", (event) => {
            const actionButton = event.target.closest("[data-chat-action]");
            if (actionButton) {
              event.stopPropagation();
              runChatAction(actionButton.dataset.chatAction, actionButton.dataset.windowId).catch(reportError);
              return;
            }
            if (state.justOpenedChatActions) return;
            const chat = state.chats.find(
              (item) => item.windowId === button.dataset.windowId
            );
            if (chat) {
              setChatActionsOpen("");
              setSidebarOpen(false);
              loadWindow(chat);
            }
          });
        });
      }

      function renderMessages(options = {}) {
        const { scrollToBottom = false } = options;
        state.selected.clear();
        state.selectMode = false;
        document.body.classList.remove("select-mode");
        const messages = state.messages;
        if (messages.length === 0) {
          timeline.innerHTML = '<div class="empty">这个聊天还没有记录。</div>';
          syncTimelineBottomGap();
          renderConversationNavigator();
          requestAnimationFrame(() => {
            if (scrollToBottom) scrollTimelineToBottom("auto");
            updateActionButtons();
          });
          return;
        }

        let lastDay = "";
        timeline.innerHTML = messages
          .map((message) => {
            const day = formatDay(message.at);
            const divider =
              day !== lastDay
                ? `<div class="date-divider">${escapeText(day)}</div>`
                : "";
            lastDay = day;
            const archived = String(message.bucket || "").startsWith("archive:");
            const archiveView = state.currentWindow && state.currentWindow.kind === "archive";
            return `
              ${divider}
              <article id="msg-${message.id}" class="message ${escapeText(message.role)}${archiveView || archived ? " archived" : ""}" data-message-id="${message.id}" data-at="${escapeText(message.at)}">
                <div class="message-side">
                  <input type="checkbox" aria-label="选择消息" data-message-id="${message.id}" />
                  <div class="pixel-avatar" aria-hidden="true"></div>
                </div>
                <div class="bubble">
                  <div class="message-head">
                    <span class="role">${escapeText(message.role)}</span>
                    <span class="status${archiveView ? " archived" : ""}">${archiveView ? "archived window" : "active window"}</span>
                    ${message.source ? `<span>${escapeText(message.source)}</span>` : ""}
                    <span>${message.length} 字</span>
                  </div>
                  <div class="message-body">${escapeText(message.content)}</div>
                  <div class="message-foot">${escapeText(formatDate(message.at))}</div>
                </div>
              </article>
            `;
          })
          .join("") +
          '<div id="timelineBottomSentinel" class="timeline-bottom-sentinel" aria-hidden="true"></div>';
        ensureTimelineBottomAnchor();
        syncTimelineBottomGap();
        renderConversationNavigator();

        timeline.querySelectorAll("input[type='checkbox']").forEach((checkbox) => {
          checkbox.addEventListener("change", () => {
            const id = checkbox.dataset.messageId;
            const messageNode = document.getElementById(`msg-${id}`);
            if (!messageNode) return;
            if (checkbox.checked) {
              state.selected.add(id);
              messageNode.classList.add("selected");
            } else {
              state.selected.delete(id);
              messageNode.classList.remove("selected");
            }
            updateActionButtons();
          });
        });

        const LONG_PRESS_MS = 520;
        const MOVE_TOLERANCE = 10;

        timeline.querySelectorAll(".message").forEach((messageNode) => {
          const checkbox = messageNode.querySelector("input[type='checkbox']");
          let pressStartX = 0;
          let pressStartY = 0;

          const cancelLongPress = () => {
            window.clearTimeout(state.longPressTimer);
            state.longPressTimer = null;
          };

          const selectThisMessage = () => {
            cancelLongPress();
            enterSelectMode();
            state.justLongPressed = true;
            if (!checkbox.checked) {
              checkbox.checked = true;
              checkbox.dispatchEvent(new Event("change"));
            }
            window.setTimeout(() => {
              state.justLongPressed = false;
            }, 220);
          };

          messageNode.addEventListener("pointerdown", (event) => {
            if (event.target.tagName === "INPUT") return;
            cancelLongPress();
            pressStartX = event.clientX;
            pressStartY = event.clientY;
            state.longPressTimer = window.setTimeout(selectThisMessage, LONG_PRESS_MS);
          });

          messageNode.addEventListener("pointermove", (event) => {
            if (!state.longPressTimer) return;
            const movedX = Math.abs(event.clientX - pressStartX);
            const movedY = Math.abs(event.clientY - pressStartY);
            if (movedX > MOVE_TOLERANCE || movedY > MOVE_TOLERANCE) {
              cancelLongPress();
            }
          }, { passive: true });

          messageNode.addEventListener("pointerup", cancelLongPress);
          messageNode.addEventListener("pointercancel", cancelLongPress);
          messageNode.addEventListener("contextmenu", (event) => {
            event.preventDefault();
            cancelLongPress();
            selectThisMessage();
          });
          messageNode.addEventListener("click", (event) => {
            if (!state.selectMode || event.target.tagName === "INPUT") return;

            // 选择模式下，只有点击真正的气泡才切换该条消息选中。
            // 点击消息行里的空白区域时，交给 document click 退出选择模式。
            if (!event.target.closest(".bubble")) return;

            if (state.justLongPressed) {
              event.preventDefault();
              event.stopPropagation();
              return;
            }
            event.preventDefault();
            event.stopPropagation();
            checkbox.checked = !checkbox.checked;
            checkbox.dispatchEvent(new Event("change"));
          });
        });

        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            if (scrollToBottom) {
              queueTimelineBottomPin();
            }
            renderConversationNavigator();
            updateActionButtons();
          });
        });
      }

      function enterSelectMode() {
        state.selectMode = true;
        document.body.classList.add("select-mode");
      }

      function exitSelectMode() {
        state.selectMode = false;
        state.selected.clear();
        document.body.classList.remove("select-mode");
        timeline.querySelectorAll("input[type='checkbox']").forEach((checkbox) => {
          checkbox.checked = false;
        });
        timeline.querySelectorAll(".message.selected").forEach((messageNode) => {
          messageNode.classList.remove("selected");
        });
        updateActionButtons();
      }

      function updateActionButtons() {
        const selectedCount = state.selected.size;
        deleteButton.disabled = selectedCount === 0;
        updateScrollButtons();
      }

      function timelineMaxScrollTop() {
        return Math.max(0, timeline.scrollHeight - timeline.clientHeight);
      }

      function isTimelineNearBottom(threshold = 64) {
        const bottom = timelineMaxScrollTop();
        return bottom - timeline.scrollTop <= threshold;
      }

      let timelineWasNearBottom = true;
      let pendingViewportStickToBottom = false;
      let timelineResizeObserver = null;
      const mobileViewportQuery = window.matchMedia("(max-width: 680px)");
      let mobileBottomGapReady = !mobileViewportQuery.matches;

      function updateScrollButtons() {
        const maxScrollTop = timelineMaxScrollTop();
        const hasOverflow = maxScrollTop > 2;
        const topDisabled = !hasOverflow || timeline.scrollTop <= 2;
        const bottomDisabled = !hasOverflow || timeline.scrollTop >= maxScrollTop - 2;
        scrollTopButton.disabled = topDisabled;
        scrollBottomButton.disabled = bottomDisabled;
        mobileScrollTopButton.disabled = topDisabled;
        mobileScrollBottomButton.disabled = bottomDisabled;
        updateConversationNavigator();
      }

      function renderConversationNavigator() {
        const maxScrollTop = timelineMaxScrollTop();
        const userNodes = Array.from(timeline.querySelectorAll(".message.user"));
        const messageNodes = userNodes.length > 0
          ? userNodes
          : Array.from(timeline.querySelectorAll(".message"));
        const messageById = new Map(state.messages.map((message) => [String(message.id), message]));

        const sourceItems = messageNodes.map((node, index) => {
          const messageId = String(node.dataset.messageId || "");
          const message = messageById.get(messageId) || {};
          const targetScrollTop = Math.min(
            maxScrollTop,
            Math.max(0, node.offsetTop - timeline.clientHeight * 0.28)
          );
          return {
            index,
            messageId,
            targetScrollTop,
            ratio: maxScrollTop > 0 ? targetScrollTop / maxScrollTop : 0,
            at: message.at || node.dataset.at || "",
            preview: String(message.content || "")
              .replace(/\s+/g, " ")
              .trim()
              .slice(0, 180)
          };
        });
        state.conversationNavItems = sourceItems;
        const maxDashes = Math.min(32, sourceItems.length);
        const groupSize = Math.max(1, Math.ceil(sourceItems.length / Math.max(1, maxDashes)));
        state.conversationNavGroups = [];
        for (let firstIndex = 0; firstIndex < sourceItems.length; firstIndex += groupSize) {
          const lastIndex = Math.min(sourceItems.length - 1, firstIndex + groupSize - 1);
          state.conversationNavGroups.push({
            firstIndex,
            lastIndex,
            targetScrollTop: sourceItems[Math.floor((firstIndex + lastIndex) / 2)].targetScrollTop
          });
        }
        state.activeConversationNavIndex = -1;

        const hasNavigation = maxScrollTop > 2 && sourceItems.length > 0;
        conversationNavigator.classList.toggle("scrollable", hasNavigation);
        if (!hasNavigation) {
          conversationNavCollapsed.innerHTML = "";
          conversationNavList.innerHTML = "";
          return;
        }

        conversationNavCollapsed.innerHTML = state.conversationNavGroups
          .map((group, index) => `
            <button
              class="conversation-nav-dash"
              type="button"
              data-conversation-nav-group="${index}"
              aria-label="跳到第 ${group.firstIndex + 1} 至 ${group.lastIndex + 1} 个用户消息"
            ></button>
          `)
          .join("");
        conversationNavList.innerHTML = sourceItems
          .map((item, index) => `
            <button
              class="conversation-nav-item"
              type="button"
              data-conversation-nav-index="${index}"
              title="${escapeText(item.preview || "空消息")}"
              aria-label="跳到第 ${index + 1} 个用户消息"
            >${escapeText(item.preview || "空消息")}</button>
          `)
          .join("");
        updateConversationNavigator();
      }

      function updateConversationNavigator() {
        const items = state.conversationNavItems;
        if (items.length === 0) return;

        const readingPosition = timeline.scrollTop + timeline.clientHeight * 0.32;
        let low = 0;
        let high = items.length - 1;
        let activeIndex = 0;
        while (low <= high) {
          const middle = Math.floor((low + high) / 2);
          if (items[middle].targetScrollTop <= readingPosition) {
            activeIndex = middle;
            low = middle + 1;
          } else {
            high = middle - 1;
          }
        }
        if (activeIndex === state.activeConversationNavIndex) return;

        conversationNavList
          .querySelector(`[data-conversation-nav-index="${state.activeConversationNavIndex}"]`)
          ?.classList.remove("active");
        conversationNavCollapsed.querySelector(".conversation-nav-dash.active")?.classList.remove("active");
        const activeItem = conversationNavList.querySelector(`[data-conversation-nav-index="${activeIndex}"]`);
        activeItem?.classList.add("active");
        const activeGroupIndex = state.conversationNavGroups.findIndex(
          (group) => activeIndex >= group.firstIndex && activeIndex <= group.lastIndex
        );
        conversationNavCollapsed
          .querySelector(`[data-conversation-nav-group="${activeGroupIndex}"]`)
          ?.classList.add("active");
        state.activeConversationNavIndex = activeIndex;
      }

      function scrollActiveConversationNavItemIntoView() {
        conversationNavList
          .querySelector(`[data-conversation-nav-index="${state.activeConversationNavIndex}"]`)
          ?.scrollIntoView({ block: "nearest" });
      }

      function updateTimelineScrollState() {
        timelineWasNearBottom = isTimelineNearBottom(64);
        updateScrollButtons();
      }

      function timelineBottomSentinel() {
        return document.getElementById("timelineBottomSentinel");
      }

      function ensureTimelineBottomAnchor() {
        let sentinel = timelineBottomSentinel();
        if (!sentinel) {
          sentinel = document.createElement("div");
          sentinel.id = "timelineBottomSentinel";
          sentinel.className = "timeline-bottom-sentinel";
          sentinel.setAttribute("aria-hidden", "true");
          timeline.appendChild(sentinel);
        }
        return sentinel;
      }

      function syncTimelineBottomGap() {
        if (!timeline) return;

        if (mobileViewportQuery.matches && !mobileBottomGapReady) {
          timeline.style.setProperty("--timeline-bottom-gap", "45px");
          return;
        }

        const messages = Array.from(timeline.querySelectorAll(".message"));
        const lastMessage = messages[messages.length - 1];
        if (!lastMessage) {
          timeline.style.setProperty("--timeline-bottom-gap", "24px");
          return;
        }

        const bubble = lastMessage.querySelector(".bubble");
        if (!bubble) {
          timeline.style.setProperty("--timeline-bottom-gap", "24px");
          return;
        }

        const timelineRect = timeline.getBoundingClientRect();
        const bubbleRect = bubble.getBoundingClientRect();
        const isUser = lastMessage.classList.contains("user");
        const gap = isUser
          ? timelineRect.right - bubbleRect.right
          : bubbleRect.left - timelineRect.left;
        const safeGap = mobileViewportQuery.matches
          ? Math.max(42, Math.min(48, Math.round(gap)))
          : Math.max(45, Math.min(56, Math.round(gap)));

        timeline.style.setProperty("--timeline-bottom-gap", `${safeGap}px`);
      }

      function settleInitialMobileBottomGap() {
        if (!mobileViewportQuery.matches) return;
        window.setTimeout(() => {
          const shouldStickToBottom = isTimelineNearBottom(64);
          mobileBottomGapReady = true;
          syncTimelineBottomGap();
          if (shouldStickToBottom) pinTimelineToBottom("auto");
        }, 600);
      }

      function pinTimelineToBottom(behavior = "auto") {
        syncTimelineBottomGap();
        const sentinel = ensureTimelineBottomAnchor();
        const scrollBehavior = behavior === "smooth" ? "smooth" : "auto";
        sentinel.scrollIntoView({
          block: "end",
          inline: "nearest",
          behavior: scrollBehavior
        });
        if (scrollBehavior === "smooth") {
          timeline.scrollTo({ top: timeline.scrollHeight, behavior: "smooth" });
        } else {
          timeline.scrollTop = timeline.scrollHeight;
        }
        timelineWasNearBottom = true;
        updateScrollButtons();
      }

      function queueTimelineBottomPin() {
        pendingViewportStickToBottom = true;
        [0, 80, 180, 360, 800].forEach((delay) => {
          window.setTimeout(() => {
            syncTimelineBottomGap();
            pinTimelineToBottom("auto");
          }, delay);
        });
      }

      async function loadChats() {
        const data = await fetchJson(`${API_BASE}/api/chats`);
        state.chats = data.chats;

        const newest = latestChat(state.chats);
        if (!newest) {
          state.currentWindow = null;
          renderChats();
          chatTitle.textContent = "暂无聊天记录";
          chatMeta.textContent = "";
          timeline.innerHTML = '<div class="empty">还没有找到聊天 JSON。</div>';
          state.messages = [];
          updateActionButtons();
          hideNagiLoader();
          return;
        }

        if (!state.currentWindow) {
          state.currentWindow = newest;
        }

        const fresh =
          state.chats.find(
            (chat) => chat.windowId === state.currentWindow.windowId
          ) || newest;

        renderChats();
        await loadWindow(fresh);
      }

      function windowUrl(chat) {
        if (chat.kind === "telegram") {
          return `${API_BASE}/api/telegram/${encodeURIComponent(chat.chatId)}`;
        }
        if (chat.kind === "telegram_rp") {
          return `${API_BASE}/api/telegram-rp/${encodeURIComponent(chat.chatId)}`;
        }
        if (chat.kind === "archive") {
          return `${API_BASE}/api/archives/${encodeURIComponent(chat.chatId)}/${encodeURIComponent(chat.archiveId)}`;
        }
        return `${API_BASE}/api/chats/${encodeURIComponent(chat.chatId)}`;
      }

      async function loadWindow(chat, options = {}) {
        const { messageId = "" } = options;
        state.currentWindow = chat;
        const data = await fetchJson(windowUrl(chat));
        state.messages = data.messages;
        chatTitle.textContent = data.chat.title;
        chatMeta.textContent =
          data.chat.kind === "telegram"
            ? `Telegram 当前总窗口 / ${data.chat.activeCount} 条 / session ${data.state.sessionId || "new"}`
            : data.chat.kind === "telegram_rp"
            ? `Telegram RP / ${data.chat.activeCount} 条 / session ${data.state.sessionId || "new"}`
            : data.chat.kind === "archive"
            ? `归档窗口 / ${data.chat.activeCount} 条 / archived ${formatDate(data.state.archivedAt)}`
            : `当前窗口 / ${data.chat.activeCount} 条 / session ${data.state.sessionId || "new"}`;
        renderChats();
        renderMessages({ scrollToBottom: !messageId });
        if (messageId) {
          requestAnimationFrame(() => {
            requestAnimationFrame(() => {
              const messageNode = document.getElementById(`msg-${messageId}`);
              if (!messageNode) {
                setFeedback("找到了结果，但原消息已不在当前记录中。");
                return;
              }
              messageNode.classList.add("search-hit");
              messageNode.scrollIntoView({ block: "center", behavior: "smooth" });
              window.setTimeout(() => messageNode.classList.remove("search-hit"), 2600);
            });
          });
        } else {
          queueTimelineBottomPin();
        }
        setFeedback("已加载。");

        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            hideNagiLoader();
          });
        });
      }

      function mutationUrl(action) {
        if (!state.currentWindow) return "";
        if (state.currentWindow.kind === "telegram") {
          return `${API_BASE}/api/telegram/${encodeURIComponent(state.currentWindow.chatId)}/${action}`;
        }
        if (state.currentWindow.kind === "telegram_rp") {
          return `${API_BASE}/api/telegram-rp/${encodeURIComponent(state.currentWindow.chatId)}/${action}`;
        }
        if (state.currentWindow.kind === "archive") {
          return `${API_BASE}/api/archives/${encodeURIComponent(state.currentWindow.chatId)}/${encodeURIComponent(state.currentWindow.archiveId)}/${action}`;
        }
        return `${API_BASE}/api/chats/${encodeURIComponent(state.currentWindow.chatId)}/${action}`;
      }

      async function deleteMessages() {
        if (!state.currentWindow || state.selected.size === 0) return;
        if (!confirm(`确定永久删除选中的 ${state.selected.size} 条记录吗？`)) {
          return;
        }
        setFeedback("永久删除中...");
        const data = await fetchJson(
          mutationUrl("delete-messages"),
          {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ ids: Array.from(state.selected) })
          }
        );
        setFeedback(
          `永久删除完成：${data.changedCount} 条。${data.sessionIdReset ? "已备份并重置 sessionId。" : "已备份归档窗口。"}`
        );
        await loadChats();
      }

      async function archiveCurrentWindow() {
        if (!state.currentWindow || state.currentWindow.kind !== "active") return;
        if (
          !confirm(
            "确定归档当前聊天窗口吗？当前窗口会清空成新会话，旧窗口会进入左侧归档列表。"
          )
        ) {
          return;
        }
        setFeedback("归档当前窗口中...");
        await fetchJson(
          `${API_BASE}/api/chats/${encodeURIComponent(state.currentWindow.chatId)}/archive-window`,
          { method: "POST" }
        );
        state.currentWindow = null;
        setFeedback("窗口已归档，当前聊天已重置。");
        await loadChats();
      }

      async function deleteCurrentArchiveWindow() {
        if (!state.currentWindow || state.currentWindow.kind !== "archive") return;
        if (!confirm("确定永久删除这个归档窗口吗？")) return;
        setFeedback("删除归档窗口中...");
        await fetchJson(
          `${API_BASE}/api/archives/${encodeURIComponent(state.currentWindow.chatId)}/${encodeURIComponent(state.currentWindow.archiveId)}/delete-window`,
          { method: "POST" }
        );
        state.currentWindow = null;
        setFeedback("归档窗口已删除。");
        await loadChats();
      }

      function exportCurrentChat() {
        if (!state.currentWindow) return;
        window.open(`${windowUrl(state.currentWindow)}/export`, "_blank", "noopener");
      }

      async function renameCurrentWindow() {
        if (
          !state.currentWindow ||
          !["telegram", "telegram_rp"].includes(state.currentWindow.kind)
        ) {
          return;
        }
        const currentName = state.currentWindow.title || "";
        const nextName = prompt("输入新的显示名称：", currentName);
        if (nextName === null) return;
        const displayName = nextName.trim();
        if (!displayName) {
          setFeedback("显示名称不能为空。");
          return;
        }
        setFeedback("重命名中...");
        await fetchJson(mutationUrl("rename"), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ display_name: displayName })
        });
        setFeedback("已重命名。");
        await loadChats();
      }

      async function createMainBotWindow() {
        if (!state.currentWindow || state.currentWindow.kind !== "telegram") return;
        setFeedback("正在新建主 bot 窗口...");
        const data = await fetchJson(mutationUrl("new-window"), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({})
        });
        state.currentWindow = data.chat;
        setFeedback("已新建并切换到新的主 bot 窗口。");
        await loadChats();
      }

      async function switchMainBotWindow() {
        if (!state.currentWindow || state.currentWindow.kind !== "telegram") return;
        if (state.currentWindow.isActiveMainWindow) {
          setFeedback("这已经是当前主 bot 窗口。");
          return;
        }
        setFeedback("正在切换主 bot 窗口...");
        const data = await fetchJson(mutationUrl("switch-window"), { method: "POST" });
        state.currentWindow = data.chat;
        setFeedback("已切换主 bot 窗口。");
        await loadChats();
      }

      async function runChatAction(action, windowId) {
        const chat = state.chats.find((item) => item.windowId === windowId);
        if (!chat) return;
        if (!state.currentWindow || state.currentWindow.windowId !== chat.windowId) {
          await loadWindow(chat);
        }
        if (action === "export") {
          exportCurrentChat();
        } else if (action === "rename") {
          await renameCurrentWindow();
        } else if (action === "newMainWindow") {
          await createMainBotWindow();
        } else if (action === "switchMainWindow") {
          await switchMainBotWindow();
        } else if (action === "archive") {
          await archiveCurrentWindow();
        } else if (action === "deleteArchive") {
          await deleteCurrentArchiveWindow();
        }
        setChatActionsOpen("");
        setSidebarOpen(false);
      }

      function scrollTimelineToTop(behavior = "smooth") {
        if (behavior === "auto" || behavior === "instant") {
          timeline.scrollTop = 0;
          updateScrollButtons();
          return;
        }
        timeline.scrollTo({ top: 0, behavior });
      }

      function scrollTimelineToBottom(behavior = "smooth") {
        syncTimelineBottomGap();
        ensureTimelineBottomAnchor();
        if (behavior === "auto" || behavior === "instant") {
          pinTimelineToBottom("auto");
          return;
        }
        pinTimelineToBottom(behavior);
      }

      let viewportResizeTimer = null;

      function runTimelineViewportPass(shouldStickToBottom) {
        const applyViewportPass = () => {
          syncTimelineBottomGap();
          renderConversationNavigator();
          if (shouldStickToBottom) {
            pinTimelineToBottom("auto");
          } else {
            updateTimelineScrollState();
          }

        };

        applyViewportPass();
        requestAnimationFrame(applyViewportPass);
      }

      function handleTimelineViewportChange() {
        syncTimelineBottomGap();
        const shouldStickToBottom =
          pendingViewportStickToBottom || timelineWasNearBottom || isTimelineNearBottom(64);
        pendingViewportStickToBottom = false;

        [0, 80, 180, 360].forEach((delay) => {
          window.setTimeout(() => runTimelineViewportPass(shouldStickToBottom), delay);
        });
      }

      function scheduleTimelineViewportFix() {
        syncTimelineBottomGap();
        pendingViewportStickToBottom =
          pendingViewportStickToBottom || timelineWasNearBottom || isTimelineNearBottom(64);
        clearTimeout(viewportResizeTimer);
        viewportResizeTimer = setTimeout(handleTimelineViewportChange, 80);
      }

      function observeTimelineViewport() {
        if (!window.ResizeObserver) return;
        timelineResizeObserver = new ResizeObserver(scheduleTimelineViewportFix);
        timelineResizeObserver.observe(timeline);
        const shell = document.querySelector(".content-shell");
        if (shell) timelineResizeObserver.observe(shell);
      }

      function conversationNavIndexFromEvent(event) {
        const item = event.target.closest("[data-conversation-nav-index]");
        if (!item || !conversationNavList.contains(item)) return -1;
        return Number.parseInt(item.dataset.conversationNavIndex || "-1", 10);
      }

      conversationNavList.addEventListener("click", (event) => {
        const index = conversationNavIndexFromEvent(event);
        const item = state.conversationNavItems[index];
        if (!item) return;
        timeline.scrollTo({ top: item.targetScrollTop, behavior: "smooth" });
      });

      conversationNavCollapsed.addEventListener("click", (event) => {
        const dash = event.target.closest("[data-conversation-nav-group]");
        if (!dash || !conversationNavCollapsed.contains(dash)) return;
        const groupIndex = Number.parseInt(dash.dataset.conversationNavGroup || "-1", 10);
        const group = state.conversationNavGroups[groupIndex];
        if (!group) return;
        timeline.scrollTo({ top: group.targetScrollTop, behavior: "smooth" });
      });
      conversationNavigator.addEventListener("pointerenter", () => {
        requestAnimationFrame(scrollActiveConversationNavItemIntoView);
      });

      savePrepackTurnsButton.addEventListener("click", () => savePrepackSettings().catch(reportError));
      prepackTurnsInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          savePrepackSettings().catch(reportError);
        }
      });
      themeToggleButton.addEventListener("click", toggleTheme);
      refreshButton.addEventListener("click", () => loadChats().catch(reportError));
      searchInput.addEventListener("input", scheduleSearch);
      searchInput.addEventListener("keydown", (event) => {
        if (event.key !== "Escape") return;
        searchInput.value = "";
        runSearch().catch(reportError);
      });
      searchScopes.addEventListener("click", (event) => {
        const button = event.target.closest("[data-search-scope]");
        if (!button) return;
        state.searchScope = button.dataset.searchScope;
        renderSearchResults();
        if (state.searchQuery) runSearch().catch(reportError);
      });
      sidebarToggleButton.addEventListener("click", () => {
        setSidebarOpen(!document.body.classList.contains("sidebar-open"));
      });
      sidebarCloseButton.addEventListener("click", () => setSidebarOpen(false));
      sidebarBackdrop.addEventListener("click", () => setSidebarOpen(false));
      document.addEventListener("keydown", (event) => {
        if ((event.ctrlKey || event.metaKey) && event.key.toLocaleLowerCase() === "k") {
          event.preventDefault();
          setSidebarOpen(true);
          searchInput.focus();
          return;
        }
        if (event.key === "Escape" && document.activeElement !== searchInput) setSidebarOpen(false);
      });
      deleteButton.addEventListener("click", () => deleteMessages().catch(reportError));
      scrollTopButton.addEventListener("click", () => scrollTimelineToTop("smooth"));
      scrollBottomButton.addEventListener("click", () => scrollTimelineToBottom("smooth"));
      mobileScrollTopButton.addEventListener("click", () => scrollTimelineToTop("smooth"));
      mobileScrollBottomButton.addEventListener("click", () => scrollTimelineToBottom("smooth"));
      timeline.addEventListener("scroll", updateTimelineScrollState, { passive: true });
      window.addEventListener("resize", scheduleTimelineViewportFix, { passive: true });
      if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", scheduleTimelineViewportFix, { passive: true });
        window.visualViewport.addEventListener("scroll", scheduleTimelineViewportFix, { passive: true });
      }
      observeTimelineViewport();
      settleInitialMobileBottomGap();

      document.addEventListener("click", (event) => {
        if (!state.selectMode) return;

        // 长按刚触发时，浏览器可能补发一次 click；不要立刻退出选择模式。
        if (state.justLongPressed) return;

        const target = event.target;

        // 点 checkbox 本身，不退出。
        if (target.closest("input[type='checkbox']")) return;

        // 点气泡正文，不退出；交给每条 message 的 click 逻辑切换选中。
        if (target.closest(".bubble")) return;

        // 点顶部操作按钮，不退出。
        if (target.closest(".actions")) return;

        // 点对话导航器，不退出。
        if (target.closest(".conversation-navigator")) return;

        // 点手机回顶 / 回底按钮，不退出。
        if (target.closest(".mobile-scroll-jump-controls")) return;

        // 点侧边栏/聊天列表，不在这里处理退出，避免切换聊天时闪烁。
        if (target.closest(".sidebar")) return;

        // 其他位置都视为空白区域：退出选择模式并取消所有选中。
        exitSelectMode();
      }, true);

      function reportError(error) {
        setFeedback(error.message || String(error));
      }

      updateActionButtons();
      setTheme(localStorage.getItem("gemChatRecordsThemeChoice"));
      setSidebarOpen(false);
      showNagiLoader();
      loadPrepackSettings().catch(reportError);
      loadChats().catch((error) => {
        hideNagiLoader();
        reportError(error);
      });
    </script>
  </body>
</html>
