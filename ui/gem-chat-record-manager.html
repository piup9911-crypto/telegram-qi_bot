<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f7f8f6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Gem Bridge Chat Records</title>
    <style>
      :root {
            --theme-color: #f7f8f6;
        --bg: #f5f6f1;
        --panel: #ffffff;
        --ink: #202124;
        --muted: #646a73;
        --line: #d9ded8;
        --accent: #24745b;
        --accent-soft: #e4f2ed;
        --danger: #a14237;
        --archive: #745c24;
        --shadow: 0 12px 28px rgba(31, 38, 35, 0.08);
        --panel-strong: #ffffff;
        --user-bubble: #dff3ea;
        --assistant-bubble: #ffffff;
        --body-bg: var(--bg);
        --sidebar-bg: #edf0eb;
        --sidebar-blur: none;
        --topbar-bg: rgba(255, 255, 255, 0.85);
        --topbar-blur: none;
        --topbar-shadow: none;
        --button-radius: 8px;
        --button-bg: var(--panel);
        --button-hover-border: #aeb8ae;
        --button-hover-bg: var(--panel);
        --primary-border: var(--accent);
        --primary-bg: var(--accent);
        --primary-color: white;
        --danger-border: color-mix(in srgb, var(--danger) 35%, white);
        --chat-button-radius: 8px;
        --chat-button-bg: transparent;
        --chat-button-active-bg: var(--panel);
        --chat-button-active-shadow: none;
        --pill-color: var(--accent);
        --bubble-border: var(--line);
        --bubble-radius: 18px;
        --bubble-shadow: 0 4px 14px rgba(31, 38, 35, 0.06);
        --user-bubble-radius: 5px;
        --user-bubble-border: color-mix(in srgb, var(--accent) 35%, var(--line));
        --user-bubble-bg: #dff3ea;
        --assistant-bubble-radius: 5px;
        --assistant-bubble-bg: #ffffff;
        --archived-bubble-border: color-mix(in srgb, var(--archive) 28%, var(--line));
        --archived-bubble-bg: #fffaf0;
        --selected-bubble-border: var(--accent);
        --selected-bubble-shadow:
          0 0 0 2px color-mix(in srgb, var(--accent) 18%, transparent),
          0 4px 14px rgba(31, 38, 35, 0.06);
        --avatar-border: rgba(45, 50, 46, 0.18);
        --avatar-shadow: 0 5px 14px rgba(31, 38, 35, 0.12);
        --avatar-inner: rgba(255, 255, 255, 0.55);
        --user-avatar-cheek: #f58aa3;
        --user-avatar-eye: #2f3430;
        --user-avatar-mouth: #dd5e7b;
        --user-avatar-bg-start: #d9fff1;
        --user-avatar-bg-end: #91e5c4;
        --assistant-avatar-ear: #ffd36c;
        --assistant-avatar-cheek: #f58aa3;
        --assistant-avatar-eye: #2f3430;
        --assistant-avatar-mouth: #6a5a44;
        --assistant-avatar-bg-start: #eaf4ff;
        --assistant-avatar-bg-end: #a9cdfa;
        --scroll-button-border: rgba(36, 116, 91, 0.35);
        --scroll-button-color: var(--accent);
        --scroll-button-bg: rgba(255, 255, 255, 0.96);
        --scroll-button-shadow: 0 8px 18px rgba(31, 38, 35, 0.18);
        --chat-font: "Segoe UI", "Microsoft YaHei", "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji", "Noto Sans Symbols", "Noto Sans Symbols 2", "Noto Sans CJK SC", sans-serif;
      }

      body[data-theme="peach"] {
        --theme-color: #f7f8f6;
        --bg: #f7f8f6;
        --panel: rgba(255, 255, 255, 0.78);
        --panel-strong: rgba(255, 255, 255, 0.9);
        --ink: #2f2d2a;
        --muted: #85817c;
        --line: rgba(230, 224, 216, 0.72);
        --accent: #7f9b86;
        --accent-soft: #edf5ee;
        --user-bubble: #ffe4dc;
        --assistant-bubble: rgba(255, 255, 255, 0.9);
        --danger: #b87578;
        --archive: #92794f;
        --shadow: 0 10px 26px rgba(70, 60, 48, 0.045);
        --body-bg: linear-gradient(180deg, #fbfbf9 0%, #f7f8f6 48%, #f3f1ee 100%);
        --sidebar-bg: rgba(255, 255, 255, 0.66);
        --sidebar-blur: blur(18px);
        --topbar-bg: rgba(255, 255, 255, 0.78);
        --topbar-blur: blur(18px);
        --topbar-shadow: none;
        --button-radius: 999px;
        --button-bg: rgba(255, 255, 255, 0.82);
        --button-hover-border: rgba(127, 155, 134, 0.38);
        --button-hover-bg: rgba(255, 255, 255, 0.94);
        --primary-border: rgba(127, 155, 134, 0.26);
        --primary-bg: rgba(127, 155, 134, 0.18);
        --primary-color: #6f8875;
        --danger-border: rgba(184, 117, 120, 0.24);
        --chat-button-radius: 18px;
        --chat-button-bg: rgba(255, 255, 255, 0.34);
        --chat-button-active-bg: rgba(255, 255, 255, 0.82);
        --chat-button-active-shadow: 0 8px 20px rgba(70, 60, 48, 0.045);
        --pill-color: #6f8875;
        --bubble-border: rgba(255, 255, 255, 0.86);
        --bubble-radius: 20px;
        --bubble-shadow: var(--shadow);
        --user-bubble-radius: 6px;
        --user-bubble-border: rgba(255, 233, 227, 0.95);
        --user-bubble-bg: var(--user-bubble);
        --assistant-bubble-radius: 6px;
        --assistant-bubble-bg: var(--assistant-bubble);
        --archived-bubble-border: rgba(146, 121, 79, 0.18);
        --archived-bubble-bg: rgba(255, 250, 240, 0.9);
        --selected-bubble-border: rgba(127, 155, 134, 0.36);
        --selected-bubble-shadow:
          0 0 0 2px rgba(127, 155, 134, 0.12),
          var(--shadow);
        --avatar-border: rgba(255, 255, 255, 0.86);
        --avatar-inner: rgba(255, 255, 255, 0.58);
        --avatar-shadow: 0 5px 14px rgba(70, 60, 48, 0.055);
        --user-avatar-cheek: #d99898;
        --user-avatar-eye: #2f2d2a;
        --user-avatar-mouth: #9a7d70;
        --user-avatar-bg-start: #ffe4dc;
        --user-avatar-bg-end: #ffd1c5;
        --assistant-avatar-ear: #f3cf83;
        --assistant-avatar-cheek: #e8baa8;
        --assistant-avatar-eye: #2f2d2a;
        --assistant-avatar-mouth: #9a7d70;
        --assistant-avatar-bg-start: #edf5ee;
        --assistant-avatar-bg-end: #dfeee2;
        --scroll-button-border: rgba(127, 155, 134, 0.22);
        --scroll-button-color: #6f8875;
        --scroll-button-bg: rgba(255, 255, 255, 0.86);
        --scroll-button-shadow: 0 8px 18px rgba(70, 60, 48, 0.06);
      }

      body[data-theme="soda"] {
        --theme-color: #fff6ef;
        --bg: #f4e7cc;
        --panel: #fff8eb;
        --panel-strong: #fff8eb;
        --ink: #3f3832;
        --muted: #8a7c72;
        --line: #e0c8aa;
        --accent: #d88972;
        --accent-soft: #f6d6c8;
        --danger: #b76b66;
        --archive: #9a7a4b;
        --shadow: 0 14px 32px rgba(92, 68, 45, 0.10);
        --body-bg:
          radial-gradient(circle at 12% 8%, rgba(255, 250, 232, 0.95), transparent 32%),
          radial-gradient(circle at 88% 86%, rgba(216, 137, 114, 0.18), transparent 30%),
          linear-gradient(145deg, #fff6df 0%, #f4e7cc 48%, #ead6b6 100%);
        --sidebar-bg: #ead9bd;
        --sidebar-blur: none;
        --topbar-bg: rgba(255, 248, 235, 0.92);
        --topbar-blur: blur(16px);
        --topbar-shadow: 0 10px 24px rgba(92, 68, 45, 0.06);
        --button-radius: 999px;
        --button-bg: var(--panel);
        --button-hover-border: #d88972;
        --button-hover-bg: var(--panel);
        --primary-border: var(--accent);
        --primary-bg: var(--accent);
        --primary-color: white;
        --danger-border: color-mix(in srgb, var(--danger) 35%, white);
        --chat-button-radius: 16px;
        --chat-button-bg: rgba(255, 248, 235, 0.36);
        --chat-button-active-bg: #fff8eb;
        --chat-button-active-shadow: 0 8px 20px rgba(92, 68, 45, 0.10);
        --pill-color: var(--accent);
        --bubble-border: var(--line);
        --bubble-radius: 18px;
        --bubble-shadow: 0 6px 18px rgba(92, 68, 45, 0.08);
        --user-bubble-radius: 5px;
        --user-bubble-border: #d88972;
        --user-bubble-bg: #f2c7b5;
        --assistant-bubble-radius: 5px;
        --assistant-bubble-bg: #fff8eb;
        --archived-bubble-border: color-mix(in srgb, var(--archive) 28%, var(--line));
        --archived-bubble-bg: #fff3d9;
        --selected-bubble-border: var(--accent);
        --selected-bubble-shadow:
          0 0 0 2px color-mix(in srgb, var(--accent) 18%, transparent),
          0 4px 14px rgba(31, 38, 35, 0.06);
        --avatar-border: rgba(130, 93, 61, 0.22);
        --avatar-inner: rgba(255, 255, 255, 0.55);
        --avatar-shadow: 0 5px 14px rgba(92, 68, 45, 0.14);
        --user-avatar-cheek: #dd7f79;
        --user-avatar-eye: #3f3832;
        --user-avatar-mouth: #c76b67;
        --user-avatar-bg-start: #f7d5c6;
        --user-avatar-bg-end: #d88972;
        --assistant-avatar-ear: #f1cf78;
        --assistant-avatar-cheek: #d88972;
        --assistant-avatar-eye: #3f3832;
        --assistant-avatar-mouth: #7a5f48;
        --assistant-avatar-bg-start: #fff1d5;
        --assistant-avatar-bg-end: #8fa98e;
        --scroll-button-border: rgba(216, 137, 114, 0.42);
        --scroll-button-color: #b76b66;
        --scroll-button-bg: rgba(255, 255, 255, 0.96);
        --scroll-button-shadow: 0 8px 18px rgba(31, 38, 35, 0.18);
      }

      * {
        box-sizing: border-box;
      }

      html {
        height: 100%;
      }

      body {
        height: 100%;
        margin: 0;
        overflow: hidden;
        color: var(--ink);
        background: var(--body-bg);
        font-family: var(--chat-font);
      }

      body[data-theme="peach"] {
        font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
      }

      .app {
        display: grid;
        /* 【小白可调】整个页面分成两列：
           260px = 左侧聊天窗口菜单栏的宽度。
           minmax(0, 1fr) = 右侧聊天内容区，会自动占满剩余空间。
           想让左侧菜单更窄：把 260px 改小，比如 220px。
           想让左侧菜单更宽：把 260px 改大，比如 300px。
           注意：左侧越宽，右侧聊天气泡区域就越窄。 */
        grid-template-columns: 260px minmax(0, 1fr);
        height: 100vh;
        height: 100dvh;
        min-height: 0;
      }

      .sidebar {
        /* 【小白可调】左侧菜单栏本身的样式。
           border-right 是右边那条分隔线。
           background 是左侧菜单背景色。
        padding 第一个数字控制上下留白，第二个数字控制左右留白。 */
        border-right: 1px solid var(--line);
        background: var(--sidebar-bg);
        backdrop-filter: var(--sidebar-blur);
        padding: 16px 12px;
        height: 100%;
        min-height: 0;
        overflow-y: auto;
        overscroll-behavior: contain;
        -webkit-overflow-scrolling: touch;
      }

      .sidebar-backdrop {
        display: none;
      }

      .brand {
        padding: 8px 10px 16px;
      }

      .brand-header,
      .topbar-title {
        display: flex;
        align-items: flex-start;
        gap: 10px;
      }

      .brand h1 {
        margin: 0 0 6px;
        font-size: 18px;
        letter-spacing: 0;
      }

      .brand p,
      .muted {
        margin: 0;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
      }

      .chat-list {
        display: grid;
        gap: 8px;
      }

      .search-panel {
        display: grid;
        gap: 8px;
        padding: 0 4px 12px;
      }

      .search-input {
        width: 100%;
        min-height: 38px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 8px 10px;
        color: var(--ink);
        background: var(--panel);
        font: inherit;
        outline: none;
      }

      .search-input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 16%, transparent);
      }

      .search-scopes {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
      }

      .search-scope {
        min-width: 0;
        min-height: 30px;
        border: 0;
        border-right: 1px solid var(--line);
        border-radius: 0;
        padding: 4px 2px;
        color: var(--muted);
        background: var(--panel);
        font-size: 11px;
        cursor: pointer;
      }

      .search-scope:last-child {
        border-right: 0;
      }

      .search-scope.active {
        color: var(--primary-color);
        background: var(--primary-bg);
      }

      .search-results {
        display: none;
        gap: 2px;
      }

      .sidebar.searching .chat-list {
        display: none;
      }

      .sidebar.searching .search-results {
        display: grid;
      }

      .search-summary {
        margin: 4px 6px 8px;
        color: var(--muted);
        font-size: 12px;
      }

      .search-result {
        width: 100%;
        border: 0;
        border-bottom: 1px solid var(--line);
        border-radius: 0;
        padding: 10px 6px;
        color: var(--ink);
        background: transparent;
        text-align: left;
        cursor: pointer;
      }

      .search-result:hover,
      .search-result:focus-visible {
        background: var(--chat-button-active-bg);
        outline: none;
      }

      .search-result-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 5px;
        font-size: 12px;
      }

      .search-result-title {
        min-width: 0;
        overflow: hidden;
        font-weight: 700;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .search-result-meta {
        flex: 0 0 auto;
        color: var(--muted);
        font-size: 11px;
      }

      .search-excerpt {
        margin: 0;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.55;
        overflow-wrap: anywhere;
      }

      .search-excerpt mark {
        padding: 0 2px;
        color: var(--ink);
        background: color-mix(in srgb, #f2c94c 55%, transparent);
      }

      .chat-group-title {
        margin: 18px 10px 8px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
      }

      .chat-button {
        width: 100%;
        padding: 10px;
        border: 1px solid transparent;
        border-radius: var(--chat-button-radius);
        color: var(--ink);
        background: var(--chat-button-bg);
        text-align: left;
        cursor: pointer;
      }

      .chat-button:hover,
      .chat-button.active {
        border-color: var(--line);
        background: var(--chat-button-active-bg);
        box-shadow: var(--chat-button-active-shadow);
      }

      .chat-actions {
        display: none;
        grid-template-columns: 1fr;
        gap: 6px;
        margin-top: 8px;
      }

      .chat-button.actions-open .chat-actions {
        display: grid;
      }

      .chat-action-button {
        min-height: 30px;
        width: 100%;
        justify-content: center;
        background: rgba(255, 255, 255, 0.72);
      }

      .chat-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        font-size: 14px;
        font-weight: 650;
      }

      .pill {
        display: inline-flex;
        min-width: 22px;
        justify-content: center;
        border-radius: 999px;
        padding: 1px 7px;
        background: var(--accent-soft);
        color: var(--pill-color);
        border: none;
        font-size: 12px;
      }

      .status {
        border-radius: 999px;
        padding: 1px 7px;
        background: var(--accent-soft);
        color: var(--pill-color);
        border: none;
      }

      .main {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        min-width: 0;
        min-height: 0;
        height: 100%;
        overflow: hidden;
      }

      .topbar {
        /* 【小白可调】顶部按钮栏，也就是“刷新/导出/归档/删除”那一行。
           min-height 控制顶部栏高度。
           padding 第一个数字控制上下留白，第二个数字控制左右留白。 */
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        min-height: 74px;
        border-bottom: 1px solid var(--line);
        background: var(--topbar-bg);
        backdrop-filter: var(--topbar-blur);
        box-shadow: var(--topbar-shadow);
        padding: 12px 22px;
      }

      .topbar h2 {
        margin: 0 0 4px;
        font-size: 18px;
        letter-spacing: 0;
      }

      .actions {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: flex-end;
      }

      .prepack-turn-control {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        min-height: 34px;
        border: 1px solid var(--line);
        border-radius: var(--button-radius);
        background: var(--button-bg);
        padding: 0 8px;
        color: var(--muted);
        font-size: 13px;
        white-space: nowrap;
      }

      .prepack-turn-control input {
        width: 62px;
        min-height: 26px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--panel-strong);
        color: var(--ink);
        padding: 0 6px;
        font: inherit;
        font-size: 13px;
      }

      button {
        min-height: 34px;
        border: 1px solid var(--line);
        border-radius: var(--button-radius);
        background: var(--button-bg);
        color: var(--ink);
        padding: 0 12px;
        font: inherit;
        font-size: 13px;
        cursor: pointer;
      }

      button:hover {
        border-color: var(--button-hover-border);
        background: var(--button-hover-bg);
      }

      button.primary {
        border-color: var(--primary-border);
        background: var(--primary-bg);
        color: var(--primary-color);
      }

      button.danger {
        border-color: var(--danger-border);
        color: var(--danger);
      }

      #themeToggleButton {
        font-size: 0;
      }

      #themeToggleButton::after {
        content: "Peach Soda";
        font-size: 13px;
      }

      body[data-theme="soda"] #themeToggleButton::after {
        content: "白桃乌龙";
      }

      body[data-theme="peach"] #themeToggleButton::after {
        content: "旧版清绿";
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.5;
      }

      .icon-button {
        width: 36px;
        min-width: 36px;
        padding: 0;
        font-size: 18px;
        line-height: 1;
      }

      .sidebar-toggle,
      .sidebar-close {
        display: none;
      }

      .content-shell {
        /* 【小白可调】右侧区域再分成两列：
           minmax(0, 1fr) = 中间聊天记录区域。
           现在右侧时间条改成“滑动时浮出”，不再占固定宽度。
           所以这里不再写 118px 的第二列，聊天气泡能用完整宽度。 */
        display: block;
        position: relative;
        min-height: 0;
        height: 100%;
        overflow: hidden;
      }

      .conversation-navigator {
        display: none;
      }

      .mobile-scroll-jump-controls {
        display: none;
      }

      @media (min-width: 681px) and (hover: hover) and (pointer: fine) {
        .conversation-navigator {
          position: absolute;
          z-index: 12;
          top: 12px;
          right: 22px;
          bottom: 12px;
          display: block;
          width: 24px;
          background: transparent;
        }

        .conversation-nav-collapsed {
          position: absolute;
          inset: 0;
          display: flex;
          flex-direction: column;
          justify-content: center;
          gap: 5px;
          transition: opacity 120ms ease;
        }

        .conversation-nav-dash {
          width: 24px;
          min-width: 24px;
          height: 4px;
          min-height: 4px;
          border: 0;
          border-radius: 2px;
          padding: 0;
          background: color-mix(in srgb, var(--muted) 42%, transparent);
          cursor: pointer;
          transition: background 120ms ease, transform 120ms ease;
        }

        .conversation-nav-dash:hover,
        .conversation-nav-dash:focus-visible {
          background: color-mix(in srgb, var(--ink) 64%, transparent);
          transform: scaleX(1.08);
        }

        .conversation-nav-dash.active {
          background: var(--ink);
        }

        .conversation-nav-panel {
          position: absolute;
          z-index: 13;
          top: 50%;
          right: -2px;
          display: grid;
          grid-template-rows: 42px minmax(0, 1fr) 42px;
          gap: 6px;
          width: min(330px, calc(100vw - 350px));
          height: min(520px, calc(100% - 24px));
          border: 1px solid var(--line);
          border-radius: 18px;
          padding: 8px 6px 8px 8px;
          background: var(--panel);
          color: var(--ink);
          box-shadow: var(--shadow);
          opacity: 0;
          visibility: hidden;
          transform: translate(8px, -50%);
          pointer-events: none;
        }

        .conversation-navigator:hover .conversation-nav-panel,
        .conversation-navigator:focus-within .conversation-nav-panel {
          opacity: 1;
          visibility: visible;
          transform: translate(0, -50%);
          pointer-events: auto;
        }

        .conversation-navigator:hover .conversation-nav-collapsed,
        .conversation-navigator:focus-within .conversation-nav-collapsed {
          opacity: 0;
          pointer-events: none;
        }

        .conversation-nav-list {
          min-height: 0;
          overflow-x: hidden;
          overflow-y: auto;
          overscroll-behavior: contain;
          scrollbar-color: color-mix(in srgb, var(--muted) 42%, transparent) transparent;
          scrollbar-width: thin;
        }

        .conversation-nav-list::-webkit-scrollbar {
          width: 8px;
        }

        .conversation-nav-list::-webkit-scrollbar-track {
          background: transparent;
        }

        .conversation-nav-list::-webkit-scrollbar-thumb {
          border: 2px solid transparent;
          border-radius: 999px;
          background: color-mix(in srgb, var(--muted) 42%, transparent);
          background-clip: padding-box;
        }

        .conversation-nav-jump {
          display: flex;
          align-items: center;
          justify-content: center;
          width: 100%;
          min-height: 42px;
          border: 0;
          border-radius: 12px;
          padding: 0;
          background: transparent;
          color: var(--accent);
          font-family: Georgia, "Times New Roman", serif;
          font-size: 25px;
          font-weight: 400;
          line-height: 1;
          cursor: pointer;
          transition: background 120ms ease, color 120ms ease, transform 120ms ease;
        }

        .conversation-nav-jump:hover,
        .conversation-nav-jump:focus-visible {
          background: color-mix(in srgb, var(--accent) 10%, transparent);
          color: var(--accent);
        }

        .conversation-nav-jump:disabled {
          background: transparent;
          color: color-mix(in srgb, var(--accent) 34%, transparent);
          cursor: default;
          opacity: 1;
          transform: none;
        }

        .conversation-nav-item {
          display: block;
          width: 100%;
          min-height: 34px;
          border: 0;
          border-radius: 10px;
          padding: 7px 10px;
          overflow: hidden;
          background: transparent;
          color: var(--ink);
          font-size: 13px;
          line-height: 20px;
          text-align: left;
          text-overflow: ellipsis;
          white-space: nowrap;
          cursor: pointer;
        }

        .conversation-nav-item:hover,
        .conversation-nav-item:focus-visible {
          background: color-mix(in srgb, var(--line) 50%, transparent);
        }

        .conversation-nav-item.active {
          background: color-mix(in srgb, var(--line) 76%, transparent);
          font-weight: 600;
        }

        .conversation-navigator:not(.scrollable) {
          display: none;
        }

        body.sidebar-open .conversation-navigator {
          display: none;
        }
      }

      .timeline {
        /* 【小白可调】聊天记录滚动区域。
           padding: 10px 10px;
           第一个 10px = 整个聊天列表顶部/底部留白。
           第二个 10px = 整个聊天列表左边/右边留白。
           你觉得聊天内容离窗口边缘太远，就把第二个数字改小，比如 6px。 */
        overflow: auto;
        height: 100%;
        min-height: 0;
        padding:
          10px
          10px
          calc(
            var(--timeline-bottom-gap, 24px) +
            min(env(safe-area-inset-bottom, 0px), 12px) -
            7px
          ); /* 改 chat 页的底部距离 */
        scroll-behavior: smooth;
        -webkit-overflow-scrolling: touch;
        overscroll-behavior: contain;
        overflow-anchor: none;
      }

      .timeline-bottom-sentinel {
        height: 1px;
        width: 100%;
        pointer-events: none;
        overflow-anchor: none;
      }

      .date-divider {
        /* 【小白可调】日期分隔线，比如“2026年5月6日”。
           gap 控制文字和左右横线之间的距离。
           margin 控制日期分隔线上下空出来多少。
           font-size 控制日期文字大小。 */
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 18px 0;
        color: var(--muted);
        font-size: 12px;
      }

      .date-divider::before,
      .date-divider::after {
        content: "";
        height: 1px;
        flex: 1;
        background: var(--line);
      }

      .message {
        display: grid;
        align-items: end;
        --avatar-size: 36px;
        --checkbox-size: 18px;
        --checkbox-avatar-gap: 2px;
        --bubble-avatar-gap: 4px;
        grid-template-columns: var(--avatar-size) var(--bubble-avatar-gap) minmax(0, 760px) var(--bubble-avatar-gap) var(--avatar-size);
        width: 100%;
        max-width: 840px;
        margin: 0 auto 8px;
        padding: 0;
        position: relative;
        touch-action: pan-y;
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
      }

      .select-mode .message {
        padding: 0;
      }

      .message.archived {
        opacity: 0.92;
      }

      .message.user {
        justify-items: end;
      }

      .message.assistant {
        justify-items: start;
      }

      .message.selected {
        outline: none;
      }

      .message-side {
        position: relative;
        width: var(--avatar-size);
        height: var(--avatar-size);
        grid-column: 1;
        grid-row: 1;
        align-self: end;
        justify-self: center;
        transform: none;
      }

      .message.user .message-side {
        grid-column: 5;
      }

      .message input {
        position: absolute;
        left: 50%;
        bottom: calc(100% + var(--checkbox-avatar-gap));
        width: var(--checkbox-size);
        height: var(--checkbox-size);
        margin: 0;
        accent-color: var(--accent);
        opacity: 0;
        pointer-events: none;
        transform: translateX(-50%);
        transition: opacity 0.14s ease;
      }

      .select-mode .message input {
        /* 【小白可调】进入选择/编辑模式时，checkbox 变成可见、可点击。
           如果你以后想让 checkbox 一直显示，就需要改这里和上面的 .message input。 */
        opacity: 1;
        pointer-events: auto;
      }

      .message input:checked {
        opacity: 1;
      }

      .pixel-avatar {
        /* 【小白可调】像素头像尺寸。
           width/height 越大，头像越大，气泡旁边占的位置也越多。
           想更像微信那种紧凑头像，可以试 32px；想更可爱突出，可以试 40px。 */
        width: var(--avatar-size);
        height: var(--avatar-size);
        display: block;
        /* 【小白可调】头像底部和气泡底部的对齐微调。
           数字越大，头像会稍微往上抬；通常不用改。 */
        margin-bottom: 0;
        /* 【小白可调】头像边框和圆角。
           border 控制边框粗细/颜色。
           border-radius 越大越圆，越小越方。像素风一般不要太圆。 */
        border: 2px solid var(--avatar-border);
        border-radius: 12px;
        image-rendering: pixelated;
        box-shadow:
          inset 0 0 0 2px var(--avatar-inner),
          var(--avatar-shadow);
        position: relative;
      }

      .message.user .pixel-avatar {
        background:
          linear-gradient(var(--user-avatar-cheek) 0 0) 7px 19px / 4px 4px no-repeat,
          linear-gradient(var(--user-avatar-cheek) 0 0) 27px 19px / 4px 4px no-repeat,
          linear-gradient(var(--user-avatar-eye) 0 0) 12px 13px / 4px 5px no-repeat,
          linear-gradient(var(--user-avatar-eye) 0 0) 23px 13px / 4px 5px no-repeat,
          linear-gradient(#ffffff 0 0) 13px 13px / 1px 2px no-repeat,
          linear-gradient(#ffffff 0 0) 24px 13px / 1px 2px no-repeat,
          linear-gradient(var(--user-avatar-mouth) 0 0) 17px 24px / 5px 2px no-repeat,
          linear-gradient(135deg, var(--user-avatar-bg-start), var(--user-avatar-bg-end));
        transform: scaleX(-1);
      }

      .message.assistant .pixel-avatar {
        background:
          linear-gradient(var(--assistant-avatar-ear) 0 0) 5px 5px / 5px 5px no-repeat,
          linear-gradient(var(--assistant-avatar-ear) 0 0) 28px 5px / 5px 5px no-repeat,
          linear-gradient(var(--assistant-avatar-cheek) 0 0) 8px 20px / 4px 4px no-repeat,
          linear-gradient(var(--assistant-avatar-cheek) 0 0) 26px 20px / 4px 4px no-repeat,
          linear-gradient(var(--assistant-avatar-eye) 0 0) 12px 14px / 4px 5px no-repeat,
          linear-gradient(var(--assistant-avatar-eye) 0 0) 23px 14px / 4px 5px no-repeat,
          linear-gradient(#ffffff 0 0) 13px 14px / 1px 2px no-repeat,
          linear-gradient(#ffffff 0 0) 24px 14px / 1px 2px no-repeat,
          linear-gradient(var(--assistant-avatar-mouth) 0 0) 17px 25px / 5px 2px no-repeat,
          linear-gradient(135deg, var(--assistant-avatar-bg-start), var(--assistant-avatar-bg-end));
      }

      .message.archived .pixel-avatar {
        filter: sepia(0.28) saturate(0.82);
      }

      .bubble {
        /* 【小白可调】聊天气泡本体。
           grid-column: 3 表示 bot 和 user 的气泡都在中间同一条气泡轨道里。
           width: fit-content 表示短消息按文字自然变小，不会强行拉宽。
           max-width: 100% 表示长消息最多撑满中间气泡轨道，到边界后自动换行。
           这就是“短消息像社交软件，长消息边框对齐”的关键。
           border-radius 控制圆角；padding 控制文字离气泡边缘的距离。 */
        grid-column: 3;
        grid-row: 1;
        position: relative;
        width: fit-content;
        max-width: 100%;
        border: 1px solid var(--bubble-border);
        border-radius: var(--bubble-radius);
        padding: 10px 12px 8px;
        background: var(--panel);
        box-shadow: var(--bubble-shadow);
        font-family: var(--chat-font);
      }

      .message.user .bubble {
        /* 【小白可调】右侧 user 气泡。
           justify-self: end 表示短 user 气泡贴着中间气泡轨道的右边。
           头像距离已经由上面的 grid-template-columns 里的 8px 控制，不在这里用 margin。 */
        justify-self: end;
        margin-right: 0;
        border-bottom-right-radius: var(--user-bubble-radius);
        border-color: var(--user-bubble-border);
        background: var(--user-bubble-bg);
      }

      .message.assistant .bubble {
        /* 【小白可调】左侧 bot/assistant 气泡。
           justify-self: start 表示短 bot 气泡贴着中间气泡轨道的左边。
           长 bot 气泡撑满气泡轨道时，右边框会和长 user 气泡的右边框对齐。 */
        justify-self: start;
        margin-left: 0;
        border-bottom-left-radius: var(--assistant-bubble-radius);
        background: var(--assistant-bubble-bg);
      }

      .message.archived .bubble {
        border-color: var(--archived-bubble-border);
        background: var(--archived-bubble-bg);
      }

      .message.selected .bubble {
        border-color: var(--selected-bubble-border);
        box-shadow: var(--selected-bubble-shadow);
      }

      .message.search-hit .bubble {
        border-color: var(--accent);
        box-shadow:
          0 0 0 3px color-mix(in srgb, var(--accent) 20%, transparent),
          var(--bubble-shadow);
      }

      .message-head {
        /* 【小白可调】气泡顶部的小字区域，比如 user、active window、字数。
           gap 控制这些小标签之间的距离。
           margin-bottom 控制它和正文之间的距离。
           font-size 控制这行小字的大小。 */
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
        margin-bottom: 6px;
        color: var(--muted);
        font-size: 12px;
      }

      .role {
        color: var(--ink);
        font-weight: 700;
      }

      .status {
        border-radius: 999px;
        padding: 1px 7px;
        background: var(--accent-soft);
        color: var(--accent);
      }

      .status.archived {
        background: #f5ebcf;
        color: var(--archive);
      }

      .message-body {
        /* 【小白可调】气泡正文。
           line-height 控制行距，数字越大每行越松。
           font-size 控制正文大小。
           overflow-wrap: anywhere 是为了避免很长的英文/链接撑破气泡。 */
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        line-height: 1.6;
        font-size: 14px;
        font-family: var(--chat-font);
      }

      .message-foot {
        /* 【小白可调】气泡底部时间，比如 09:46。
           margin-top 控制时间和正文的距离。
           font-size 控制时间文字大小。
           text-align: right 表示时间靠右显示。 */
        margin-top: 5px;
        color: var(--muted);
        font-size: 11px;
        text-align: right;
      }




      /* 首次进入页面的全屏加载遮罩：最新聊天加载完成后淡出 */
      #nagi-loader-wrapper {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        background:
          radial-gradient(circle at 50% 40%, #ffffff 0%, #fafaf8 58%, #f4f5ef 100%);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        opacity: 1;
        pointer-events: auto;
        transition: opacity 0.18s ease;
      }

      #nagi-loader-wrapper.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .nagi-loader-stage {
        position: relative;
        width: min(420px, calc(100vw - 34px));
        aspect-ratio: 5 / 3;
        overflow: hidden;
        border: 1px solid rgba(112, 122, 95, 0.16);
        border-radius: 22px;
        background:
          linear-gradient(to bottom, rgba(255, 255, 255, 0.74), rgba(250, 250, 246, 0.92)),
          radial-gradient(circle at 20% 26%, rgba(255, 255, 255, 0.96), transparent 36%);
        box-shadow:
          0 14px 36px rgba(49, 56, 48, 0.1),
          inset 0 0 0 1px rgba(255, 255, 255, 0.55);
      }

      .nagi-ground-shadow {
        position: absolute;
        left: 8%;
        right: 8%;
        bottom: 55px;
        height: 10px;
        border-radius: 999px;
        background: rgba(137, 135, 112, 0.08);
        filter: blur(2px);
        z-index: 1;
      }

      .nagi-ground-line {
        position: absolute;
        left: 6%;
        right: 6%;
        bottom: 56px;
        height: 2px;
        background: rgba(164, 168, 150, 0.72);
        border-radius: 999px;
        z-index: 2;
      }

      /* 草和萝卜共用同一移动轨道，所以速度保持一致 */
      .nagi-moving-strip {
        position: absolute;
        left: 0;
        bottom: 56px;
        width: 200%;
        height: 58px;
        animation: nagiStripMove 3.45s linear infinite;
        pointer-events: none;
        z-index: 3;
      }

      .nagi-grass,
      .nagi-obstacle {
        position: absolute;
        bottom: 0;
        width: var(--nagi-w);
        height: var(--nagi-h);
        background-repeat: no-repeat;
        background-size: contain;
        background-position: center bottom;
        image-rendering: pixelated;
        transform-origin: bottom center;
      }

      .nagi-grass {
        animation: nagiGrassSway 1.12s ease-in-out infinite alternate;
      }
